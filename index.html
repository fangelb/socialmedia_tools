<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generador de tuits — @joventutcat</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f3ee;
    --surface: #ffffff;
    --accent: #d63f2e;
    --accent-light: #fdf0ee;
    --text: #1a1a1a;
    --text-muted: #7a7570;
    --border: #e2ddd8;
    --success: #2a7a4b;
    --char-ok: #2a7a4b;
    --char-warn: #c47a1a;
    --char-bad: #d63f2e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
  }

  header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 2.5rem;
  }

  .logo-mark {
    width: 44px;
    height: 44px;
    background: var(--accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .logo-mark svg {
    width: 24px;
    height: 24px;
    fill: white;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.3rem;
    line-height: 1.2;
  }

  header p {
    font-size: 0.82rem;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .tabs {
    display: flex;
    gap: 0;
    background: var(--border);
    border-radius: 10px;
    padding: 3px;
    margin-bottom: 1.5rem;
  }

  .tab {
    flex: 1;
    padding: 0.55rem 1rem;
    border: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--text-muted);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.18s;
  }

  .tab.active {
    background: var(--surface);
    color: var(--text);
    font-weight: 600;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  .panel { display: none; }
  .panel.active { display: block; }

  .field-label {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.8rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
    display: block;
  }

  textarea, input[type="url"] {
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--text);
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 0.85rem 1rem;
    transition: border-color 0.18s;
    outline: none;
    resize: vertical;
  }

  textarea:focus, input[type="url"]:focus {
    border-color: var(--accent);
  }

  textarea { min-height: 160px; line-height: 1.6; }

  .optional-url {
    margin-top: 1rem;
  }

  .generate-btn {
    width: 100%;
    margin-top: 1.25rem;
    padding: 0.9rem 1.5rem;
    background: var(--accent);
    color: white;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    letter-spacing: 0.03em;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: opacity 0.18s, transform 0.12s;
  }

  .generate-btn:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
  .generate-btn:active:not(:disabled) { transform: translateY(0); }
  .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .loading {
    display: none;
    text-align: center;
    padding: 2rem;
    color: var(--text-muted);
    font-size: 0.9rem;
  }

  .loading.visible { display: block; }

  .spinner {
    width: 28px;
    height: 28px;
    border: 2.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 0.75rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .results { margin-top: 1.75rem; }

  .results-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.78rem;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.9rem;
  }

  .tweet-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 1.1rem 1.2rem;
    margin-bottom: 0.9rem;
    transition: border-color 0.18s;
    position: relative;
  }

  .tweet-card:hover { border-color: #c5bfb8; }

  .tweet-variant-label {
    font-family: 'Syne', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.6rem;
  }

  .tweet-text {
    font-size: 0.95rem;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .tweet-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 0.9rem;
    padding-top: 0.8rem;
    border-top: 1px solid var(--border);
  }

  .char-count {
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
  }

  .char-ok { color: var(--char-ok); }
  .char-warn { color: var(--char-warn); }
  .char-bad { color: var(--char-bad); }

  .copy-btn {
    padding: 0.35rem 0.85rem;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 7px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
  }

  .copy-btn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
  .copy-btn.copied { background: #edf7f2; border-color: var(--success); color: var(--success); }

  .error-box {
    background: #fdf0ee;
    border: 1.5px solid #f5b8b0;
    border-radius: 10px;
    padding: 0.9rem 1rem;
    font-size: 0.88rem;
    color: var(--accent);
    display: none;
    margin-top: 1rem;
  }

  .error-box.visible { display: block; }

  .note {
    background: var(--accent-light);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 0.7rem 0.9rem;
    font-size: 0.82rem;
    color: #7a3328;
    margin-bottom: 1.5rem;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.737-8.835L1.254 2.25H8.08l4.261 5.636 5.903-5.636zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
      </svg>
    </div>
    <div>
      <h1>Generador de tuits</h1>
      <p>@joventutcat · Direcció General de Joventut</p>
    </div>
  </header>

  <div class="note">
    Genera 2–3 propostes de tuit adaptades a l'estil de @joventutcat: un emoji al principi, to directe en català, accessibilitat prioritzada i màxim 280 caràcters.
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('text')">Enganxa un text</button>
    <button class="tab" onclick="switchTab('url')">Introdueix una URL</button>
  </div>

  <!-- Text panel -->
  <div class="panel active" id="panel-text">
    <label class="field-label" for="input-text">Text de la notícia</label>
    <textarea id="input-text" placeholder="Enganxa aquí el contingut de la notícia..."></textarea>
    <div class="optional-url">
      <label class="field-label" for="url-from-text">Enllaç per incloure al tuit (opcional)</label>
      <input type="url" id="url-from-text" placeholder="https://jovecat.gencat.cat/...">
    </div>
    <button class="generate-btn" onclick="generate('text')">Genera les propostes</button>
  </div>

  <!-- URL panel -->
  <div class="panel" id="panel-url">
    <label class="field-label" for="input-url">URL de la notícia</label>
    <input type="url" id="input-url" placeholder="https://jovecat.gencat.cat/ca/actualitat/...">
    <button class="generate-btn" onclick="generate('url')" style="margin-top:1.25rem">Genera les propostes</button>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    Generant propostes…
  </div>

  <div class="error-box" id="error-box"></div>

  <div class="results" id="results"></div>

</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'text') || (i === 1 && tab === 'url'));
  });
  document.getElementById('panel-text').classList.toggle('active', tab === 'text');
  document.getElementById('panel-url').classList.toggle('active', tab === 'url');
}

function charClass(n) {
  if (n <= 260) return 'char-ok';
  if (n <= 280) return 'char-warn';
  return 'char-bad';
}

function renderResults(variants) {
  const container = document.getElementById('results');
  if (!variants.length) { container.innerHTML = ''; return; }

  const labels = ['Proposta A', 'Proposta B', 'Proposta C'];
  container.innerHTML = `<div class="results-title">Propostes generades</div>` +
    variants.map((text, i) => {
      const n = text.length;
      const cls = charClass(n);
      return `
        <div class="tweet-card">
          <div class="tweet-variant-label">${labels[i] || 'Proposta ' + (i+1)}</div>
          <div class="tweet-text" id="tweet-${i}">${escHtml(text)}</div>
          <div class="tweet-footer">
            <span class="char-count ${cls}">${n} / 280 car.</span>
            <button class="copy-btn" id="copy-${i}" onclick="copyTweet(${i})">Copia</button>
          </div>
        </div>`;
    }).join('');
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyTweet(i) {
  const text = document.getElementById(`tweet-${i}`).innerText;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById(`copy-${i}`);
    btn.textContent = 'Copiat!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copia'; btn.classList.remove('copied'); }, 2000);
  });
}

function showError(msg) {
  const box = document.getElementById('error-box');
  box.textContent = msg;
  box.classList.add('visible');
}

function hideError() {
  document.getElementById('error-box').classList.remove('visible');
}

async function generate(mode) {
  hideError();
  document.getElementById('results').innerHTML = '';

  let userContent = '';
  let linkToInclude = '';

  if (mode === 'text') {
    const text = document.getElementById('input-text').value.trim();
    const url  = document.getElementById('url-from-text').value.trim();
    if (!text) { showError('Enganxa un text abans de generar.'); return; }
    userContent = text;
    linkToInclude = url;
  } else {
    const url = document.getElementById('input-url').value.trim();
    if (!url) { showError('Introdueix una URL vàlida.'); return; }
    userContent = `URL de la notícia: ${url}`;
    linkToInclude = url;
  }

  // Show loading
  document.getElementById('loading').classList.add('visible');
  document.querySelectorAll('.generate-btn').forEach(b => b.disabled = true);

  const systemPrompt = `Ets el redactor de xarxes socials de @joventutcat, el canal oficial de joventut de la Generalitat de Catalunya. 
La teva tasca és generar exactament 3 propostes de tuit en català, separades per la cadena "---SEPARADOR---".

Regles estrictes:
- Màxim 280 caràcters per tuit (comptant l'URL si n'hi ha)
- Exactament UN emoji al principi del tuit (mai més d'un)
- Si se t'indica un enllaç, inclou-lo al final precedit de 👉
- Cap hashtag, excepte #ACTIC si el contingut és sobre l'ACTIC
- To directe, informatiu, en català formal però proper
- Sense salutacions ni frases retòriques d'introducció
- Sense cometes al voltant del tuit
- Cada proposta en una sola línia de text (pots usar salts de línia naturals)
- Retorna NOMÉS les 3 propostes separades per "---SEPARADOR---", sense cap text addicional ni numeració`;

  const userPrompt = mode === 'url'
    ? `Genera 3 propostes de tuit per @joventutcat basades en la notícia d'aquesta URL: ${linkToInclude}\nInclou l'enllaç al final de cada tuit.`
    : `Genera 3 propostes de tuit per @joventutcat basades en aquest contingut:\n\n${userContent}${linkToInclude ? `\n\nInclou aquest enllaç al final de cada tuit: ${linkToInclude}` : ''}`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: userPrompt }]
      })
    });

    const data = await response.json();

    if (!response.ok) {
      throw new Error(data.error?.message || 'Error de la API');
    }

    const raw = data.content?.find(b => b.type === 'text')?.text || '';
    const variants = raw.split('---SEPARADOR---').map(s => s.trim()).filter(Boolean).slice(0, 3);

    if (!variants.length) throw new Error('No s\'han pogut parsejar les propostes.');

    renderResults(variants);

  } catch (err) {
    showError('Error en generar les propostes: ' + err.message);
  } finally {
    document.getElementById('loading').classList.remove('visible');
    document.querySelectorAll('.generate-btn').forEach(b => b.disabled = false);
  }
}
</script>
</body>
</html>
